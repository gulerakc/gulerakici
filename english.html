<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Güler Akıcı | Personal Portfolio</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

html{
scroll-behavior:smooth;
}

body{
background:#0d0d0d;
color:white;
line-height:1.7;
}

a{
text-decoration:none;
color:inherit;
}

nav{
position:fixed;
top:0;
width:100%;
padding:20px 8%;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(13,13,13,.85);
backdrop-filter:blur(10px);
z-index:100;
}

.hero{
min-height:100vh;
display:grid;
grid-template-columns:1.1fr .9fr;
align-items:center;
gap:50px;
padding:120px 8% 60px;
}

.hero h1{
font-size:58px;
}

.hero h2{
font-size:22px;
color:#cfcfcf;
margin:20px 0;
}

.hero p{
color:#bdbdbd;
max-width:650px;
}

.buttons{
margin-top:30px;
}

.btn{
display:inline-block;
padding:13px 24px;
border-radius:30px;
margin-right:12px;
background:white;
color:black;
font-weight:bold;
}

.btn.dark{
background:#1f1f1f;
color:white;
border:1px solid #333;
}

.photo{
width:100%;
max-width:420px;
border-radius:30px;
display:block;
margin:auto;
}

section{
padding:80px 8%;
}

h2{
margin-bottom:20px;
}

.card{
background:#181818;
padding:20px;
border-radius:15px;
margin-bottom:15px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.skills span{
display:inline-block;
padding:10px 15px;
background:#1a1a1a;
border-radius:20px;
margin:5px;
}

footer{
padding:30px;
text-align:center;
color:#999;
}

    .card img{
width:100%;
border-radius:10px;
margin-bottom:15px;
transition:.3s;
}

.card img:hover{
transform:scale(1.03); 
}
    
.hero h1{
font-size:42px;
}

.hero h2{
font-size:18px;
}

.buttons{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
}

.btn{
margin:0;
}

.menu{
display:flex;
gap:30px;
align-items:center;
}

.hero h4{
color:#9f9f9f;
font-size:18px;
margin-bottom:20px;
font-weight:400;
}

@media(max-width:800px){

nav{
padding:16px 7%;
}

nav h3{
font-size:24px;
}

.menu{
display:flex;
gap:10px;
justify-content:center;
flex-wrap:wrap;
align-items:center;
}

.menu a{
margin-left:0;
font-weight:600;
font-size:15px;
}

.hero{
padding-top:130px;
}

.photo{
max-height:430px;
object-fit:cover;
object-position:top;
}

.hero{
display:flex;
flex-direction:column;
}

.hero{
display:flex;
flex-direction:column;
}
    
#contact a{
    color:#4da3ff;
    text-decoration:none;
    font-weight:500;
}

#contact a:hover{
    color:#7bbcff;
    text-decoration:underline;
}
    
.card .btn.dark{
display:block;
width:fit-content;
margin:20px auto 0;
}
    .card{
    max-width:320px;
}

    .card img{
    width:220px;
    height:auto;
    display:block;
    margin:15px auto;
}
    
}   
    
</style>
  
</head>
